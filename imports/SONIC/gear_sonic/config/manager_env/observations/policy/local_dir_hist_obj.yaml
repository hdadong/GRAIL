# local_dir_hist extended with object-relative state (current pose in body frame +
# multi-future delta to the reference trajectory) for manipulation-aware tracking.
# Useful for tasks where the robot must reason about an object it is interacting with
# (e.g. sitting on a chair, manipulating a rigid object) without relying on a depth
# camera.

defaults:
  - ../terms/gravity_dir@_here_
  - ../terms/base_ang_vel@_here_
  - ../terms/joint_pos@_here_
  - ../terms/joint_vel@_here_
  - ../terms/actions@_here_
  # Object current state in body frame (3 pos + 6 ori = 9D)
  - ../terms/object_pos_b@_here_
  - ../terms/object_ori_b_6d@_here_
  # Object DELTA observations (ref_future - sim_current)
  - ../terms/object_pos_delta_multi_future@_here_
  - ../terms/object_ori_delta_multi_future_6d@_here_

_target_: gear_sonic.envs.manager_env.mdp.observations.PolicyCfg
enable_corruption: True
concatenate_terms: True


# define noise for certain terms
gravity_dir:
  history_length: ${actor_prop_history_length}
  noise:
    _target_: isaaclab.utils.noise.AdditiveUniformNoiseCfg
    n_min: -0.05
    n_max: 0.05

base_ang_vel:
  history_length: ${actor_prop_history_length}
  noise:
    _target_: isaaclab.utils.noise.AdditiveUniformNoiseCfg
    n_min: -0.2
    n_max: 0.2

joint_pos:
  history_length: ${actor_prop_history_length}
  noise:
    _target_: isaaclab.utils.noise.AdditiveUniformNoiseCfg
    n_min: -0.01
    n_max: 0.01

joint_vel:
  history_length: ${actor_prop_history_length}
  noise:
    _target_: isaaclab.utils.noise.AdditiveUniformNoiseCfg
    n_min: -0.5
    n_max: 0.5

actions:
  history_length: ${actor_actions_history_length}

# Object observations: no noise on current state, small noise on delta targets
object_pos_b:
  noise: null

object_ori_b_6d:
  noise: null

object_pos_delta_multi_future:
  noise:
    _target_: isaaclab.utils.noise.AdditiveUniformNoiseCfg
    n_min: -0.02
    n_max: 0.02

object_ori_delta_multi_future_6d:
  noise:
    _target_: isaaclab.utils.noise.AdditiveUniformNoiseCfg
    n_min: -0.02
    n_max: 0.02
