# body_names: list of bodies to penalize tilt on
#   "pelvis" for hip-level lean (hip_pitch_joint)
#   "torso_link" for torso lean (waist_pitch_joint)
# Penalty is summed across all specified bodies.
upright_penalty:
  _target_: isaaclab.managers.RewardTermCfg
  func: gear_sonic.envs.manager_env.mdp:upright_penalty
  weight: -1.0
  params:
    command_name: "motion"
    body_names: ["pelvis"]
