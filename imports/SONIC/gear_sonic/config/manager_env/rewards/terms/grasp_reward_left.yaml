# Grasp reward for LEFT hand: requires min_contacts left-hand fingers
# in contact with the object (via left-hand contact sensor).
grasp_reward_left:
  _target_: isaaclab.managers.RewardTermCfg
  func: gear_sonic.envs.manager_env.mdp:reward_grasp
  weight: 1.0
  params:
    sensor_cfg:
      _target_: isaaclab.managers.SceneEntityCfg
      name: "object_to_left_hand_contact_sensor"
    contact_threshold: 0.1
    min_contacts: 3
