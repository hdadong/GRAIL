# Full latent (decoder input) smoothness penalty
# Penalizes ||full_latent_t - full_latent_{t-1}||² where full_latent is the
# post-quantization token sent to the decoder:
#   full_latent = FSQ_quantize(encoder_output + scaled_residual)
#
# This directly penalizes jitter in the decoder's input token space.
# Complements meta_action_rate_l2 which penalizes the policy output (residual).
full_latent_rate_l2:
  _target_: isaaclab.managers.RewardTermCfg
  func: gear_sonic.envs.manager_env.mdp:full_latent_rate_l2
  weight: -0.01
