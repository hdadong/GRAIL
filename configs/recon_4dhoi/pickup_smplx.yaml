# ═══════════════════════════════════════════════════════════════════════════════
# 4D HOI Reconstruction — PICKUP (SMPL-X body model)
#
# For dynamic-object HOI: human picks up an object that moves
# during the interaction. Filters out static-object reconstructions at step 5
# (filter_object_motion: dynamic_only) so the output motion library has no
# "human stood next to thing" trivial cases.
# ═══════════════════════════════════════════════════════════════════════════════

# ── Directory paths ───────────────────────────────────────────────────────────
paths:
  results_dir: "results"
  video_dir: "generation/videos_kling"
  hmr_dir: "generation/hmr_smplx"
  hmr_cache_dir: "generation/hmr_smplx_cache"
  foundation_pose_dir: "generation/foundation_pose"
  foundation_pose_output_dir: "generation/foundation_pose_output"
  recon_cache_dir: "generation/4dhoi_recon_cache"
  depth_gt_dir: "generation/depth_maps"
  output_dir: "generation/4dhoi_recon_smplx"
  vis_scenepic_dir: "generation/vis_html"

# ── Human model config ────────────────────────────────────────────────────────
human_model:
  body_model: "g1_smplx" # smplx | soma | g1_smplx
  static_cam: true
  smplx_model_path: "imports/GEM-SMPL/inputs/checkpoints/body_models/smplx/SMPLX_NEUTRAL.npz"
  smplx_shape_params_path: "data/RenderPeople_fitsmpl"
  soma_model_path: "imports/GEM-SOMA/inputs/mhr_data/mhr_model.pt"
  soma_shape_params_path: "data/RenderPeople_fitsoma"
  g1_smplx_dir: "data/g1_smplx"

# ── Object pose tracking config ──────────────────────────────────────────────
obj_pose_tracking:
  foundation_pose_debug: 2
  crop_image: true
  interpolation_factor: 2

# ── Optimization config (passed to HOIOptimizer) ─────────────────────────────
optimization:
  log_dir: "logs"
  exp_name: "static_cam"
  use_global: False

  cache_list:
    - contact_labels

  dct_cfg:
    enable: false
    coeff_ratio: 0.15

  vis_cfg:
    vis_init: true
    enable: true
    render_video: true
    extra_views:
      - "top"
    export_mesh: false
    vis_html: true
    vis_contact: true

  # Optimization stages
  opt_stage_specs:
    # Stage 1: Human trajectory optimization
    human_traj_opt:
      opt_vars:
        human_trans_res:
          lr: 0.003
        human_pose_res:
          lr: 0.0001
      niter: 400
      loss_cfg:
        keypoint_tracking:
          weight: 0.3
          beta: 0.1
        human_smoothness:
          weight: 30.0
          beta: 0.1
        human_traj_reg:
          weight: 10.0
        human_pose_reg:
          weight: 30.0
        human_foot_contact:
          weight: 100.0 # 10.0
        human_global_init_reg:
          weight: 3000.0

    # Stage 2: Human global trajectory optimization
    human_global_traj_opt:
      opt_vars:
        human_trans_global:
          lr: 0.01
          xy_only: true
        human_pose_res:
          lr: 0.0001
      niter: 1000
      loss_cfg:
        contact:
          weight: 100000.0
          duration: "start"
          threshold: 1.0
        human_smoothness:
          weight: 300.0
          beta: 0.1
        human_pose_reg:
          weight: 30.0
        keypoint_tracking:
          weight: 0.1
          beta: 0.1

    # Stage 3: Object trajectory optimization
    obj_traj_opt:
      opt_vars:
        obj_t_res:
          lr: 0.01
        obj_R_res:
          lr: 0.001
        human_pose_res:
          lr: 0.0001
          arm_only: true
      niter: 400
      loss_cfg:
        contact:
          weight: 100000.0
          duration: "all"
          threshold: 1.0
        obj_smoothness:
          weight: 500.0
        obj_rot_reg:
          weight: 10.0
        verts_tracking:
          weight: 0.1
          threshold: 0.1

  # Evaluation configuration
  eval:
    contact:
      weight: 100000.0
      duration: "all"
      threshold: 5.0
    verts_tracking:
      weight: 0.1
      threshold: 1.0

# ── Filtering config ────────────────────────────────────────
filtering:
  camera_trans_thr: 0.1
  object_mask_tol: 1.0
  total_mask_tol: 0.4
  human_static_thr: 0
  min_frames: null
  filter_object_motion: "all" # all | static_only | dynamic_only
  object_static_thr: 0.02

# ── Post-processing config ────────────────────────────────────────
post_processing:
  center_at_object: false
  compute_contact_points_nframes_before_inter_start: 24

# ── Pipeline control ─────────────────────────────────────────────────────────
pipeline:
  skip_step1: false
  skip_step2: false
  skip_step3: false
  skip_step4: false
  skip_step5: false
  skip_step6: false
  skip_done: false
  verbose: false
  vis_valid_only: false
  is_static_obj: false
