# ═══════════════════════════════════════════════════════════════════════════════
# 4D HOI Reconstruction — MANIPULATION/PICKUP (SOMA body model)
#
# Same as manip_smplx.yaml — only body_model and the SMPL-X-specific paths
# differ. All optimization weights, filters, and post-processing settings are
# kept in sync with the SMPL-X variant by design.
# ═══════════════════════════════════════════════════════════════════════════════

# ── Directory paths ───────────────────────────────────────────────────────────
paths:
  results_dir: "results"
  video_dir: "generation/videos_kling"
  hmr_dir: "generation/hmr_soma"
  hmr_cache_dir: "generation/hmr_soma_cache"
  foundation_pose_dir: "generation/foundation_pose"
  foundation_pose_output_dir: "generation/foundation_pose_output"
  recon_cache_dir: "generation/4dhoi_recon_cache"
  depth_gt_dir: "generation/depth_maps"
  output_dir: "generation/4dhoi_recon_soma"
  vis_scenepic_dir: "generation/vis_html"

# ── Human model config ────────────────────────────────────────────────────────
human_model:
  body_model: "soma"
  static_cam: true
  smplx_model_path: "imports/GEM-SMPL/inputs/checkpoints/body_models/smplx/SMPLX_NEUTRAL.npz"
  smplx_shape_params_path: "data/RenderPeople_fitsmpl"
  soma_model_path: "imports/GEM-SOMA/inputs/mhr_data/mhr_model.pt"
  soma_shape_params_path: "data/RenderPeople_fitsoma"
  g1_smplx_dir: "data/g1_smplx"

# ── Object pose tracking config ──────────────────────────────────────────────
obj_pose_tracking:
  foundation_pose_debug: 2
  crop_image: false
  interpolation_factor: 1

# ── Optimization config (passed to HOIOptimizer) ─────────────────────────────
optimization:
  log_dir: "logs"
  exp_name: "static_cam"
  use_global: False

  cache_list:
    - contact_labels

  vis_cfg:
    vis_init: true
    enable: true
    render_video: true
    extra_views:
      - "top"
    export_mesh: false
    vis_html: true
    vis_contact: true

  opt_stage_specs:
    init_opt:
      opt_vars:
        human_trans_global:
          lr: 0.003
        human_trans_res:
          lr: 0.003
        human_pose_res:
          lr: 0.0001
        obj_t_res:
          lr: 0.003
        obj_R_res:
          lr: 0.0001
      niter: 400
      loss_cfg:
        keypoint_tracking:
          weight: 0.3
          beta: 0.1
        human_smoothness:
          weight: 30.0
          beta: 0.1
        human_pose_reg:
          weight: 100.0
        human_foot_contact:
          weight: 10.0
        human_global_init_reg:
          weight: 3000.0
        verts_tracking:
          weight: 0.3
        obj_smoothness:
          weight: 50.0
        depth_pointcloud:
          weight: 100.0
          duration: "all"
          interval: 1
          num_gt_samples: 3000
          trim_pct: 0.2
          depth_tol: 0.02

    contact_opt:
      opt_vars:
        human_trans_global:
          lr: 0.003
        human_trans_res:
          lr: 0.003
        human_pose_res:
          lr: 0.001
        obj_t_res:
          lr: 0.003
        obj_R_res:
          lr: 0.0001
      niter: 200
      loss_cfg:
        keypoint_tracking:
          weight: 0.3
          beta: 0.1
        human_smoothness:
          weight: 30.0
          beta: 0.1
        human_pose_reg:
          weight: 100.0
        human_foot_contact:
          weight: 10.0
        human_global_init_reg:
          weight: 3000.0
        obj_precontact_reg:
          weight: 100.0
        verts_tracking:
          weight: 0.3
        obj_smoothness:
          weight: 50.0
        depth_pointcloud:
          weight: 100.0
          duration: "all"
          interval: 1
          num_gt_samples: 3000
          trim_pct: 0.2
          depth_tol: 0.02
        contact:
          weight: 30000.0
          duration: "all"
          depth_only: true
          max_contact_dist: 0.15

  eval:
    keypoint_tracking:
      weight: 0.1
      beta: 0.1
      threshold: 2.0
    contact:
      weight: 100000.0
      duration: "all"
      threshold: 5.0
      max_contact_dist: 0.15

# ── Filtering config ────────────────────────────────────────
filtering:
  camera_trans_thr: 0.1
  object_mask_tol: 0.5
  total_mask_tol: 0.3
  human_static_thr: 0.01
  min_frames: null
  filter_object_motion: "dynamic_only"  # MANIPULATION: drop static-object recons
  object_static_thr: 0.02

# ── Post-processing config ────────────────────────────────────────
post_processing:
  center_at_object: true
  compute_contact_points_nframes_before_inter_start: 48

# ── Pipeline control ─────────────────────────────────────────────────────────
pipeline:
  skip_step1: false
  skip_step2: false
  skip_step3: false
  skip_step4: false
  skip_step5: false
  skip_step6: false
  skip_done: false
  verbose: false
  vis_valid_only: false
  is_static_obj: false  # MANIPULATION: object moves → run FoundationPose
