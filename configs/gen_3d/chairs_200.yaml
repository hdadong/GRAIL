# 200 rigid chair prompts for Hunyuan3D-2.1 generation.
# All entries are single rigid bodies — no folding/articulated/wheeled mechanisms.
# Avoid: swivel posts, caster bases, drafting/task/office/gaming chairs, footring-on-swivel.
# These violate `loco_smplx.yaml`'s `is_static_obj: true` assumption (chair must stay still under sitting human).
#
# Usage:
#   python -m grail.pipelines.gen_3d_assets -i configs/gen_3d/chairs_200.yaml -o data/gen_chairs_<results_subdir>

