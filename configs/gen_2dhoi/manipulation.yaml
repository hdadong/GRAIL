character: kid
character_dir: data/characters
texture_dir: data/characters
results_dir: results_collection/manipulation001
object_config: configs/objects/comasset.yaml
verbose: false
skip_step1: false
skip_step2: true
skip_step3: false
skip_step4: false
skip_done: false
paths:
  prompts_dir: "generation/prompts"
  initial_state_dir: "generation/initial_states"
  obj_scale_dir: "generation/obj_scales"
  render_dir: "generation/asset_renders"
  camera_dir: "generation/cameras"
  foundation_pose_input_dir: "generation/foundation_pose"
  depth_save_dir: "generation/depth_maps"
  video_output_dir: "generation/videos_kling"
simulation:

  drop_height: 0.1
  settling_time: 5.0
  initial_rotation_perturbation: 2.0
  seed: 42
  save_usd: false
  use_initial_state: true
scale:
  max_iterations: 5
rendering:

  samples: 32
  width: 1280
  height: 720
  num_rand_scenes: 3
  gpu: true
  no_rand_seed: false
  render_start_end: false
video:
  num_videos: 1
  num_video_segments: 1
  model_api: kling-ai
  kling_model_name: kling-v2-5-turbo
  duration: "5"
  kling_mode: pro
  skip_prompt_refinement: false
  base_prompt:
    - The person interacts with the object. The camera should remain static.
    - The person moves the object (pull or push). The camera should remain static.
  seg_idx_for_tail_image: -1
  use_all_tail_images: false
  video_max_retries: 100
  video_retry_wait: 30
chatgpt:
  prompt_refinement_system_message:
    - |
      Create a simple video prompt for a person interacting with a {category}.

      Base prompt: "{base_prompt}"

      Requirements:
      1. The person interacts with the object as they would in daily life.
      2. Static camera - no camera movement
      3. If picking up the object, continue holding/moving it - don't put it back down

      IMPORTANT: Respond with ONLY the refined prompt text. Do not include any preambles, explanations, or conversational phrases like "Sure, here's..." or "Here is...". Just output the prompt directly.
  scale_evaluation_system_message: |
    You are evaluating whether a {category} in a rendered indoor scene has the correct real-world size.

    Look at the image carefully. There is a person and a {category} in the scene. Judge whether the {category} appears to be the correct real-world size relative to the person and the room.

    You MUST respond with EXACTLY one word — one of the following three options:
    - "small" if the object looks too small compared to its real-world size
    - "big" if the object looks too big compared to its real-world size
    - "correct" if the object appears to be approximately the correct real-world size

    Do NOT include any other text, explanation, or punctuation. Just one word.
scene_config: configs/scenes/default.yaml
