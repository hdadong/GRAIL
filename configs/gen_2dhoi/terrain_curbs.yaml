character: kid
character_dir: data/characters
texture_dir: data/characters
results_dir: results_collection/terrain_curbs
object_config: configs/objects/terrain_curbs.yaml
verbose: false
skip_step1: true
skip_step2: true
skip_step3: false
skip_step4: false
skip_done: false
paths:
  prompts_dir: "generation/prompts"
  initial_state_dir: "generation/initial_states"
  obj_scale_dir: "generation/obj_scales"
  render_dir: "generation/asset_renders"
  camera_dir: "generation/cameras"
  foundation_pose_input_dir: "generation/foundation_pose"
  depth_save_dir: "generation/depth_maps"
  video_output_dir: "generation/videos_kling"
simulation:
  drop_height: 0.1
  settling_time: 5.0
  initial_rotation_perturbation: 5.0
  seed: 42
  save_usd: false
  use_initial_state: true
scale:
  max_iterations: 5
rendering:
  samples: 32
  width: 1280
  height: 720
  num_rand_scenes: 10
  gpu: true
  no_rand_seed: false
  render_start_end: false
video:
  num_videos: 1
  num_video_segments: 1
  model_api: kling-ai
  kling_model_name: kling-v3
  duration: "10"
  kling_mode: pro
  skip_prompt_refinement: false
  video_max_retries: 100
  video_retry_wait: 30
  base_prompt:
    - "The person carefully steps onto the terrain and walks slowly toward the right. The camera should remain static."
    - "The person walks slowly onto the terrain toward the middle, makes a U-turn, and walks slowly back to the left side of the image, then stops. The camera should remain static."
  seg_idx_for_tail_image: -1
  use_all_tail_images: false
chatgpt:
  prompt_refinement_system_message:
    - |
      Generate a video prompt for a person walking across terrain.

      Look at the image and describe the person walking slowly across the terrain (curbs/slopes/stairs), turning around at the middle, and walking back.

      Rules:
      - Static camera
      - Slow, natural walking pace with small steps
      - Person stays visible in frame
      - Ends at LEFT side of frame, facing left

      Example: "A boy faces low curbs indoors. Static camera. He walks slowly with small steps, stepping onto each curb carefully. At the middle, he turns around smoothly. He walks back slowly, stepping down each curb. He stops at the left side of the frame, facing left, remaining visible."

      Output ONLY the prompt, nothing else.
    - |
      Generate a video prompt for a person walking across terrain.

      Look at the image and describe the person walking slowly across the terrain (curbs/slopes/stairs) from one side to the other.

      Rules:
      - Static camera
      - Slow, natural walking pace with small steps
      - Person stays visible in frame
      - Ends at RIGHT side of frame

      Example: "A boy faces low curbs indoors. Static camera. He walks slowly with small steps, stepping onto each curb carefully. He continues across all curbs at a slow pace. He stops at the right side of the frame, remaining visible."

      Output ONLY the prompt, nothing else.
  scale_evaluation_system_message: |
    You are evaluating whether a {category} in a rendered indoor scene has the correct real-world size.

    Look at the image carefully. There is a person and a {category} in the scene. Judge whether the {category} appears to be the correct real-world size relative to the person and the room.

    You MUST respond with EXACTLY one word — one of the following three options:
    - "small" if the object looks too small compared to its real-world size
    - "big" if the object looks too big compared to its real-world size
    - "correct" if the object appears to be approximately the correct real-world size

    Do NOT include any other text, explanation, or punctuation. Just one word.
scene_config: configs/scenes/default.yaml
