character: kid
character_dir: data/characters
texture_dir: data/characters
results_dir: results_collection/sitting001
object_config: configs/objects/chair_sitting.yaml
verbose: false
skip_step1: true
skip_step2: true
skip_step3: false
skip_step4: false
skip_done: false
paths:
  prompts_dir: "generation/prompts"
  initial_state_dir: "generation/initial_states"
  obj_scale_dir: "generation/obj_scales"
  render_dir: "generation/asset_renders"
  camera_dir: "generation/cameras"
  foundation_pose_input_dir: "generation/foundation_pose"
  depth_save_dir: "generation/depth_maps"
  video_output_dir: "generation/videos_kling"
simulation:
  drop_height: 0.1
  settling_time: 5.0
  initial_rotation_perturbation: 5.0
  seed: 42
  save_usd: false
  use_initial_state: true
scale:
  max_iterations: 5
rendering:
  samples: 128
  width: 1280
  height: 720
  num_rand_scenes: 10
  gpu: true
  no_rand_seed: true
  render_start_end: false
video:
  num_videos: 1
  num_video_segments: 1
  model_api: kling-ai
  kling_model_name: kling-v2-5-turbo
  duration: "5"
  kling_mode: pro
  skip_prompt_refinement: false
  base_prompt:
    - The person walks over and sits down on the chair naturally. The camera should remain static.
    - The person approaches and takes a seat on the chair. The camera should remain static.
  seg_idx_for_tail_image: -1
  use_all_tail_images: false
  video_max_retries: 100
  video_retry_wait: 30
scene_config: configs/scenes/default.yaml