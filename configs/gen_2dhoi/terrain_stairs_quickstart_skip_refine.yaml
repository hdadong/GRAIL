character: kid
character_dir: data/characters
texture_dir: data/characters
results_dir: results_collection/terrain_stairs
object_config: configs/objects/terrain_syn_stairs_v1.yaml
verbose: false
skip_step1: true
skip_step2: true
skip_step3: false
skip_step4: false
skip_done: false
paths:
  prompts_dir: "generation/prompts"
  initial_state_dir: "generation/initial_states"
  obj_scale_dir: "generation/obj_scales"
  render_dir: "generation/asset_renders"
  camera_dir: "generation/cameras"
  foundation_pose_input_dir: "generation/foundation_pose"
  depth_save_dir: "generation/depth_maps"
  video_output_dir: "generation/videos_kling"
simulation:
  drop_height: 0.1
  settling_time: 5.0
  initial_rotation_perturbation: 5.0
  seed: 42
  save_usd: false
  use_initial_state: true
scale:
  max_iterations: 5
rendering:
  samples: 32
  width: 1280
  height: 720
  num_rand_scenes: 10
  gpu: true
  no_rand_seed: false
  render_start_end: false
video:
  num_videos: 1
  num_video_segments: 1
  model_api: kling-ai
  kling_model_name: kling-v3
  duration: "10"
  kling_mode: pro
  skip_prompt_refinement: true
  video_max_retries: 100
  video_retry_wait: 30
  base_prompt:
    - "The person walks toward the staircase and carefully climbs up the stairs step by step. They stop partway up and remain standing there. The camera should remain static."
    - "The person approaches the staircase. They carefully climb up a few steps, pause, then carefully descend back down. The camera should remain static."
  seg_idx_for_tail_image: -1
  use_all_tail_images: false
chatgpt:
  prompt_refinement_system_message:
    - |
      Generate a video prompt for a person climbing a staircase.

      Look at the image. If the staircase is tall, the person should only climb partway up and stop. If the staircase is short, they can reach the top. The person must NEVER walk beyond the visible stairs or disappear from the frame.

      Rules:
      - Static camera
      - Slow, careful pace climbing one step at a time
      - Person stays visible in frame at all times
      - Person stops on the stairs (partway up for tall stairs, at the top for short stairs)
      - Do NOT have the person walk off the stairs or through the ceiling

      Example: "A boy faces a wooden staircase indoors. Static camera. He walks slowly toward the stairs, then carefully climbs up a few steps. He stops on the stairs and stands still, remaining visible in the frame."

      Output ONLY the prompt, nothing else.
    - |
      Generate a video prompt for a person climbing a staircase and then descending.

      Look at the image. The person climbs up a few steps, pauses, then carefully descends back down. They should NOT climb all the way to the top if the staircase is tall.

      Rules:
      - Static camera
      - Slow, careful pace climbing and descending
      - Person stays visible in frame at all times
      - Person climbs a few steps, pauses, then descends
      - Person ends at the bottom of the stairs

      Example: "A boy faces a wooden staircase indoors. Static camera. He walks slowly toward the stairs and carefully climbs up a few steps. He pauses, then turns and descends slowly step by step. He stops at the bottom of the stairs, remaining visible."

      Output ONLY the prompt, nothing else.
  scale_evaluation_system_message: |
    You are evaluating whether a {category} in a rendered indoor scene has the correct real-world size.

    Look at the image carefully. There is a person and a {category} in the scene. Judge whether the {category} appears to be the correct real-world size relative to the person and the room.

    You MUST respond with EXACTLY one word — one of the following three options:
    - "small" if the object looks too small compared to its real-world size
    - "big" if the object looks too big compared to its real-world size
    - "correct" if the object appears to be approximately the correct real-world size

    Do NOT include any other text, explanation, or punctuation. Just one word.
scene_config: configs/scenes/default.yaml